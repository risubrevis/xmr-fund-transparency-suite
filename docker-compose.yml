services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: xmrdashboard
      POSTGRES_USER: xmruser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - xmrnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xmruser -d xmrdashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - xmrnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  monero-wallet-rpc:
    image: ghcr.io/sethforprivacy/simple-monero-wallet-rpc:latest
    command: >
      --daemon-address xmr.letmego.me:18089
      --rpc-bind-port 18082
      --wallet-dir /home/monero
      --disable-rpc-login
      --trusted-daemon
    volumes:
      - monero_data:/home/monero
    ports:
      - "18082:18082"
    networks:
      - xmrnet
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://xmruser:${DB_PASSWORD}@postgres/xmrdashboard
      REDIS_URL: redis://redis:6379
      MONERO_RPC_URL: http://monero-wallet-rpc:18082/json_rpc
      API_KEY: ${API_KEY}
      VIEW_KEY_MASTER_SECRET: ${VIEW_KEY_MASTER_SECRET}
      SETTINGS_FILE_PATH: /app/data/settings.json
      SCAN_INTERVAL: "60"
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xmrnet
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - xmrnet

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://xmruser:${DB_PASSWORD}@postgres/xmrdashboard
      MONERO_RPC_URL: http://monero-wallet-rpc:18082/json_rpc
      SCAN_INTERVAL: "60"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xmrnet
    restart: unless-stopped

volumes:
  postgres_data:
  monero_data:

networks:
  xmrnet:
    driver: bridge
