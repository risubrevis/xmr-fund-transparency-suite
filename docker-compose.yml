# XMR Fund Transparency Suite — unified Docker Compose configuration.
#
# Production (default):
#   docker compose up -d
#
# Development (hot-reload, debug logs):
#   ./scripts/setup.sh --dev
#
# Multi-instance: use ./scripts/setup.sh --instance=NAME to deploy isolated
# instances (prod, demo, staging) on the same host. Host ports and the Compose
# project name are parameterized via .env (see .env.example for all variables).
# Container-internal ports are unchanged — only host-side ports differ.
#
# Variable defaults are set for production. Development overrides are
# exported by setup.sh when run with --dev.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: xmrdashboard
      POSTGRES_USER: xmruser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - xmrnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xmruser -d xmrdashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - xmrnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  monero-wallet-rpc:
    image: ghcr.io/sethforprivacy/simple-monero-wallet-rpc:latest
    command: >
      --daemon-address ${MONERO_DAEMON_ADDRESS:-xmr.letmego.me:18089}
      --rpc-bind-port 18082
      --wallet-dir /home/monero
      --disable-rpc-login
      --trusted-daemon
    volumes:
      - ./monero-wallet-rpc:/home/monero
    ports:
      - "${MONERO_RPC_PORT:-18082}:18082"
    networks:
      - xmrnet
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: ${INSTALL_DEV:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://xmruser:${DB_PASSWORD}@postgres/xmrdashboard
      REDIS_URL: redis://redis:6379
      MONERO_RPC_URL: http://monero-wallet-rpc:18082/json_rpc
      API_KEY: ${API_KEY}
      VIEW_KEY_MASTER_SECRET: ${VIEW_KEY_MASTER_SECRET}
      SETTINGS_FILE_PATH: /app/data/settings.json
      SCAN_INTERVAL: "60"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      APP_URL: ${APP_URL:-localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-Strict}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xmrnet
    restart: ${RESTART_POLICY:-unless-stopped}
    command: ${BACKEND_COMMAND:-uvicorn app.main:app --host 0.0.0.0 --port 8000}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_TARGET:-production}
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_INTERNAL_PORT:-80}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://backend:8000}
      APP_URL: ${APP_URL:-localhost}
    depends_on:
      - backend
    networks:
      - xmrnet

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: ${INSTALL_DEV:-false}
    environment:
      DATABASE_URL: postgresql+asyncpg://xmruser:${DB_PASSWORD}@postgres/xmrdashboard
      MONERO_RPC_URL: http://monero-wallet-rpc:18082/json_rpc
      VIEW_KEY_MASTER_SECRET: ${VIEW_KEY_MASTER_SECRET}
      SCAN_INTERVAL: "60"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SKIP_MIGRATIONS: "true"
      WAIT_FOR_DB: "true"
      ENVIRONMENT: ${ENVIRONMENT:-local}
      APP_URL: ${APP_URL:-localhost}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./backend:/app
    command: ${WORKER_COMMAND:-python -m worker.scanner}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xmrnet
    restart: ${RESTART_POLICY:-unless-stopped}

networks:
  xmrnet:
    driver: bridge
