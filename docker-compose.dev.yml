# Development configuration with hot-reload and source volume mounts.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# Production (uses docker-compose.yml):
#   docker compose up -d --build

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: xmrdashboard
      POSTGRES_USER: xmruser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - xmrnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xmruser -d xmrdashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./redis:/data
    ports:
      - "6379:6379"
    networks:
      - xmrnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  monero-wallet-rpc:
    image: ghcr.io/sethforprivacy/simple-monero-wallet-rpc:latest
    command: >
      --daemon-address xmr.letmego.me:18089
      --rpc-bind-port 18082
      --wallet-dir /home/monero
      --disable-rpc-login
      --trusted-daemon
    volumes:
      - ./monero-wallet-rpc:/home/monero
    ports:
      - "18082:18082"
    networks:
      - xmrnet
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://xmruser:${DB_PASSWORD}@postgres/xmrdashboard
      REDIS_URL: redis://redis:6379
      MONERO_RPC_URL: http://monero-wallet-rpc:18082/json_rpc
      API_KEY: ${API_KEY}
      VIEW_KEY_MASTER_SECRET: ${VIEW_KEY_MASTER_SECRET}
      SETTINGS_FILE_PATH: /app/data/settings.json
      SCAN_INTERVAL: "60"
      LOG_LEVEL: DEBUG
      LOG_FORMAT: text
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xmrnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    networks:
      - xmrnet

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql+asyncpg://xmruser:${DB_PASSWORD}@postgres/xmrdashboard
      MONERO_RPC_URL: http://monero-wallet-rpc:18082/json_rpc
      SCAN_INTERVAL: "60"
      LOG_LEVEL: DEBUG
      LOG_FORMAT: text
      SKIP_MIGRATIONS: "true"
    volumes:
      - ./backend:/app
    command: watchfiles "python -m worker.scanner" /app/app /app/worker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xmrnet

networks:
  xmrnet:
    driver: bridge
